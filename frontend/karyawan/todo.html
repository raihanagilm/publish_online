<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - Sistem Absensi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/todo.css">
</head>
<body class="app-page karyawan-todo">

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-fingerprint brand-icon"></i>
                <span class="brand-text">Absensi<span>Ku</span></span>
            </div>
            
            <div class="user-profile-summary">
                <div class="avatar-circle" id="karyawan-avatar">K</div>
                <div class="profile-info">
                    <h4 id="user-display-name">Karyawan</h4>
                    <span id="user-display-role">Karyawan</span>
                </div>
            </div>

            <nav class="sidebar-menu">
                <a href="/karyawan/absen" class="menu-item">
                    <i class="fas fa-fingerprint"></i> Absen Masuk/Keluar
                </a>
                <a href="/karyawan/riwayat" class="menu-item">
                    <i class="fas fa-history"></i> Riwayat Absen
                </a>
                <a href="/karyawan/todo" class="menu-item active">
                    <i class="fas fa-list-check"></i> Todo List
                </a>
                <a href="#" id="btn-logout-desktop" class="menu-item logout-link">
                    <i class="fas fa-sign-out-alt"></i> Keluar
                </a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="sidebar-toggle" class="sidebar-toggle-btn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Todo List</h1>
                </div>
                <div class="topbar-right">
                    <span class="current-date-time" id="live-clock">Senin, 22 Juni 2026 | 00:00:00</span>
                </div>
            </header>

            <main class="main-content">
                <section class="content-section card mb-6">
                    <div class="section-header">
                        <h2>Daftar Tugas Anda</h2>
                    </div>

                    <div id="todo-list" class="todo-list mt-4">
                        <div class="text-center py-8 text-light">Memuat tugas...</div>
                    </div>
                </section>

                <section class="content-section card">
                    <div class="section-header">
                        <h2>Tambahkan Tugas Baru</h2>
                    </div>

                    <form id="todo-form" class="todo-form mt-4">
                        <div class="form-group">
                            <label for="todo-title">Judul Tugas</label>
                            <input type="text" id="todo-title" placeholder="Contoh: Kirim laporan harian" required>
                        </div>
                        <div class="form-group">
                            <label for="todo-description">Deskripsi</label>
                            <textarea id="todo-description" rows="4" placeholder="Opsional: detail tambahan tugas"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="todo-due-date">Tanggal Jatuh Tempo</label>
                            <input type="date" id="todo-due-date">
                        </div>
                        <div id="todo-error-msg" class="error-message"></div>
                        <button class="btn btn-primary" id="btn-add-todo" type="submit">
                            <i class="fas fa-plus"></i> Tambah Tugas
                        </button>
                    </form>
                </section>
            </main>
        </div>

        <nav class="mobile-nav">
            <a href="/karyawan/absen" class="mobile-nav-item">
                <i class="fas fa-fingerprint"></i>
                <span>Absen</span>
            </a>
            <a href="/karyawan/riwayat" class="mobile-nav-item">
                <i class="fas fa-history"></i>
                <span>Riwayat</span>
            </a>
            <a href="/karyawan/todo" class="mobile-nav-item active">
                <i class="fas fa-list-check"></i>
                <span>Todo</span>
            </a>
            <a href="#" id="btn-logout-mobile" class="mobile-nav-item logout-link">
                <i class="fas fa-sign-out-alt"></i>
                <span>Keluar</span>
            </a>
        </nav>
    </div>

    <script src="/assets/js/app.js"></script>
</body>
</html>
